name: Test Examples
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUSTFLAGS: "-Dwarnings -A deprecated"
  CARGO_TERM_COLOR: always

jobs:
  find-examples:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.find-examples.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Find example directories
        id: find-examples
        run: |
          echo "matrix=$(find . -type f -name "Anchor.toml" -exec dirname {} \; | jq -R -s -c '{example: split("\n")[:-1]}')" >> $GITHUB_OUTPUT

  test-examples:
    needs: find-examples
    name: Test ${{ matrix.example }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.find-examples.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v5
      - uses: arcium-hq/setup-arcium@v0.9.5
        with:
          runner-arch-os: x86_64_linux

      - name: Load cached cargo registry
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./*/target
            ./*/*/target
          key: ${{ runner.os }}-cargo-${{ matrix.example }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.example }}-

      - name: Test ${{ matrix.example }}
        run: |
          pushd ${{ matrix.example }}
          yarn install
          arcium build

          # Run the test and capture logs
          echo "Running arcium test..."
          sudo prlimit --pid $$ --nofile=1048576:1048576
          timeout 10m arcium test || EXIT_CODE=$?
          CONTAINER_ID=$(docker ps -q -l)
          if [ -n "$CONTAINER_ID" ]; then
            echo "Most recent docker container id: $CONTAINER_ID"
            docker logs "$CONTAINER_ID"
          else
            echo "No docker container found"
          fi
          echo "=== Docker Containers ==="
          docker ps -a
          echo "=== Callback Server Logs ==="
          cat artifacts/callback_server.log || true
          echo "=== Docker Compose Logs ==="
          docker compose -f artifacts/docker-compose-arx-env.yml logs || true
          echo "=== Anchor Program Logs ==="
          cat .anchor/program-logs/*.log 2>/dev/null || true
          echo "=== Anchor Validator Log ==="
          cat .anchor/test-ledger/validator.log 2>/dev/null | tail -100 || true
          popd

          if [ -n "$EXIT_CODE" ]; then
            exit $EXIT_CODE
          fi

      - name: Save cargo registry
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./*/target
            ./*/*/target
          key: ${{ runner.os }}-cargo-${{ matrix.example }}-${{ hashFiles('**/Cargo.lock') }}
